<head>
  <title>Most Basic Super-Hands Example</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script>
    delete AFRAME.components["grabbable"];
  </script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.x/dist/aframe-extras.min.js"></script></script>
  <script src="https://unpkg.com/super-hands@^3.0.6/dist/super-hands.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.7.0/dist/aframe-extras.min.js"></script>
</head>

<body>
  <!-- Create the scene, add physics. -->
  <a-scene physics>
    <!-- Preload any assets that will be used in the scene. -->
    <a-assets></a-assets>

    <!-- Create the player. -->
    <a-entity id="player" movement-controls="speed: 0.15">
      <a-camera></a-camera>
      <a-entity sphere-collider="objects: a-box" super-hands static-body="shape: sphere; sphereRadius: 0.02" hand-controls="hand: left"></a-entity>
      <a-entity sphere-collider="objects: a-box" super-hands static-body="shape: sphere; sphereRadius: 0.02" hand-controls="hand: right"></a-entity>
    </a-entity>
    
    <!-- hover & drag-drop won't have any obvious effect without some additional event handlers or components. See the examples page for more -->
    <a-plane static-body color="#0000FF" rotation="-90 -90 0" width="20" height="20"></a-plane>
    <a-box hoverable grabbable draggable droppable color="green" position="0 2 -1" depth="0.3" height="0.3" width="0.3" dynamic-body orientation></a-box>
  </a-scene>
</body>
