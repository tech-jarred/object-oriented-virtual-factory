<head>
  <title>Most Basic Super-Hands Example</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script>
    delete AFRAME.components["grabbable"];
  </script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.x/dist/aframe-extras.min.js"></script></script>
  <script src="https://unpkg.com/super-hands@^3.0.6/dist/super-hands.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
  <script src="https://rawgit.com/ngokevin/aframe-event-set-component/master/dist/aframe-event-set-component.min.js"></script>
  <script src="https://unpkg.com/aframe-environment-component@1.5.x/dist/aframe-environment-component.min.js"></script>
</head>

<body>
  <!-- Create the scene, add physics. -->
  <a-scene physics>
    <!-- Add environment to background. -->
    <a-entity environment="preset: checkerboard" position="0 -10 0"></a-entity>
    <!-- Preload any assets that will be used in the scene. -->
    <a-assets></a-assets>

    <!-- Create the player. -->
    <a-entity id="player" movement-controls="speed: 0.15">
      <a-camera></a-camera>
      <a-entity sphere-collider="objects: a-box" super-hands static-body="shape: sphere; sphereRadius: 0.1" hand-controls="hand: left"></a-entity>
      <a-entity sphere-collider="objects: a-box" super-hands static-body="shape: sphere; sphereRadius: 0.1" hand-controls="hand: right"></a-entity>
    </a-entity>
    
    <!-- hover & drag-drop won't have any obvious effect without some additional event handlers or components. See the examples page for more -->
    <a-plane static-body color="#0000FF" rotation="0 -90 0" width="20" height="20"></a-plane>
    <a-box hoverable grabbable draggable droppable physics-grab color="red" position="0 2 -1" depth="0.3" height="0.3" width="0.3" dynamic-body orientation event-set__grabstart="_event: grab-start; material.color: green" event-set__grabend="_event: grab-end; color: red"></a-box>
  </a-scene>
</body>
