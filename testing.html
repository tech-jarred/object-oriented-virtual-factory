<!DOCTYPE html>
<html>
<head>
  <title>A-Frame Factory Prototype</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script>
    // Fix for super-hands/extras conflict
    delete AFRAME.components["grabbable"];
  </script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.x/dist/aframe-extras.min.js"></script>
  <script src="https://unpkg.com/super-hands@^3.0.6/dist/super-hands.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
  <script src="https://rawgit.com/ngokevin/aframe-event-set-component/master/dist/aframe-event-set-component.min.js"></script>
  <script src="https://unpkg.com/aframe-environment-component@1.5.x/dist/aframe-environment-component.min.js"></script>

  <script>
    // 1. GLOBAL SETTINGS
    window.factorySettings = {
      size: 0.3,
      color: "red",
      spawnRate: 2000
    };

    // 2. SPAWNER COMPONENT
    AFRAME.registerComponent('spawner', {
      init: function () {
        this.startSpawning();
      },
      startSpawning: function () {
        this.spawnTimer = setInterval(() => {
          this.createEntity();
        }, window.factorySettings.spawnRate);
      },
      createEntity: function () {
        let el = document.createElement('a-box');
        const spawnPos = this.el.object3D.position;
        const s = window.factorySettings.size;

        el.setAttribute('position', {x: spawnPos.x, y: spawnPos.y, z: spawnPos.z});
        el.setAttribute('scale', {x: s, y: s, z: s});
        el.setAttribute('color', window.factorySettings.color);
        
        // Physics & Interaction
        el.setAttribute('dynamic-body', 'mass: 1');
        el.setAttribute('hoverable', '');
        el.setAttribute('grabbable', '');
        el.setAttribute('draggable', '');
        el.setAttribute('droppable', '');
        el.classList.add('spawned-item');

        this.el.sceneEl.appendChild(el);
      }
    });

    // 3. UPDATED DELETION ZONE COMPONENT
    AFRAME.registerComponent('destruction-zone', {
      init: function () {
        // This event is fired because of the 'contactEventName' in the a-scene
        this.el.addEventListener('collisestart', (e) => {
          // In A-Frame Physics, detail.targetEl is the entity hitting this one
          const collidedEl = e.detail.targetEl;
          
          if (collidedEl && collidedEl.classList.contains('spawned-item')) {
            console.log("Entity Deleted:", collidedEl.id);
            collidedEl.parentNode.removeChild(collidedEl);
          }
        });
      }
    });
  </script>
</head>

<body>
  <a-scene physics="contactEventName: collisestart; debug: false">
    
    <a-entity environment="preset: checkerboard" position="0 -10 0"></a-entity>
    <a-assets></a-assets>

    <a-entity id="player" movement-controls="speed: 0.15">
      <a-camera></a-camera>
      <a-entity sphere-collider="objects: .spawned-item" super-hands static-body="shape: sphere; sphereRadius: 0.1" hand-controls="hand: left"></a-entity>
      <a-entity sphere-collider="objects: .spawned-item" super-hands static-body="shape: sphere; sphereRadius: 0.1" hand-controls="hand: right"></a-entity>
    </a-entity>
    
    <a-plane static-body color="#0000FF" rotation="-90 -90 0" width="20" height="20"></a-plane>
    
    <a-sphere id="testing" position="0.44932 5 -5.84318" color="yellow" radius="0.5" spawner></a-sphere>

    <a-box 
        destruction-zone
        static-body 
        position="-5 1 -5" 
        width="6" height="3" depth="1" 
        color="red" 
        opacity="0.5">
    </a-box>

    <a-box hoverable grabbable draggable droppable color="red" position="0 2 -1" depth="0.3" height="0.3" width="0.3" dynamic-body event-set__grabstart="_event: grab-start; material.color: green" event-set__grabend="_event: grab-end; color: red"></a-box>
    
  </a-scene>
</body>
</html>
