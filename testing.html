<!DOCTYPE html>
<html>
<head>
  <title>A-Frame Stable Factory</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script>
    delete AFRAME.components["grabbable"];
  </script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.x/dist/aframe-extras.min.js"></script>
  <script src="https://unpkg.com/super-hands@^3.0.6/dist/super-hands.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
  <script src="https://unpkg.com/aframe-event-set-component@^4.1.1/dist/aframe-event-set-component.min.js"></script>
  <script src="https://unpkg.com/aframe-environment-component@1.5.x/dist/aframe-environment-component.min.js"></script>

  <script>
    window.factorySettings = { size: 0.3, color: "red", spawnRate: 2000 };

    // 1. IMPROVED BUTTON COMPONENT
    AFRAME.registerComponent('pressable-button', {
      schema: {
        action: {type: 'string'},
        value: {type: 'string'},
        depth: {type: 'number', default: 0.05} // How far it pushes in
      },
      init: function () {
        this.canPress = true;
        
        // Listen for the trigger pull (grab-start)
        // Even without 'grabbable', super-hands fires this event when you pull the trigger
        this.el.addEventListener('grab-start', () => {
          if (this.canPress) {
            this.press();
          }
        });
      },
      press: function () {
        this.canPress = false;
        const data = this.data;

        // Logic Update
        if (data.action === 'color') {
          window.factorySettings.color = data.value;
        } else if (data.action === 'size') {
          window.factorySettings.size = Math.max(0.1, Math.min(1.5, window.factorySettings.size + parseFloat(data.value)));
        }

        // Animation: Move locally on Z-axis (perpendicular to the parent wall)
        // We use object3D for smooth, reliable local movement
        this.el.object3D.position.z -= data.depth;

        setTimeout(() => {
          this.el.object3D.position.z += data.depth;
          // Cooldown before next press allowed
          setTimeout(() => { this.canPress = true; }, 200);
        }, 150);
      }
    });

    // 2. SPAWNER
    AFRAME.registerComponent('spawner', {
      init: function () {
        setInterval(() => {
          let el = document.createElement('a-box');
          const s = window.factorySettings.size;
          el.setAttribute('position', this.el.object3D.position);
          el.setAttribute('scale', {x: s, y: s, z: s});
          el.setAttribute('color', window.factorySettings.color);
          el.setAttribute('dynamic-body', 'mass: 1; allowSleep: false');
          el.setAttribute('hoverable', '');
          el.setAttribute('grabbable', '');
          el.classList.add('spawned-item');
          this.el.sceneEl.appendChild(el);
        }, window.factorySettings.spawnRate);
      }
    });

    // 3. DESTRUCTION ZONE
    AFRAME.registerComponent('physics-destruction', {
      init: function () {
        this.el.addEventListener('collide', (e) => {
          const collidedEl = e.detail.body.el;
          if (collidedEl && collidedEl.classList.contains('spawned-item')) {
            setTimeout(() => { if (collidedEl.parentNode) collidedEl.parentNode.removeChild(collidedEl); }, 0);
          }
        });
      }
    });
  </script>
</head>

<body>
  <a-scene physics="debug: false">
    <a-entity environment="preset: checkerboard" position="0 -10 0"></a-entity>
    
    <a-entity id="player" movement-controls="speed: 0.15">
      <a-camera position="0 1.6 0"></a-camera>
      <a-entity sphere-collider="objects: .spawned-item, .button" super-hands static-body="shape: sphere; sphereRadius: 0.1" hand-controls="hand: left"></a-entity>
      <a-entity sphere-collider="objects: .spawned-item, .button" super-hands static-body="shape: sphere; sphereRadius: 0.1" hand-controls="hand: right"></a-entity>
    </a-entity>
    
    <a-plane static-body color="#0000FF" rotation="-90 0 0" width="20" height="20"></a-plane>
    <a-sphere position="0.44 5 -5.8" color="white" radius="0.5" spawner></a-sphere>

    <a-entity position="-1.5 1.2 -2" rotation="0 30 0">
      <a-box width="1.2" height="0.8" depth="0.05" color="#222" static-body></a-box>
      
      <a-entity position="-0.3 0.1 0.05">
         <a-box class="button" width="0.2" height="0.2" depth="0.05" color="red" 
                hoverable pressable-button="action: color; value: red"
                event-set__hover="_event: hover-start; material.opacity: 0.7"
                event-set__leave="_event: hover-end; material.opacity: 1"></a-box>
      </a-entity>

      <a-entity position="0 0.1 0.05">
         <a-box class="button" width="0.2" height="0.2" depth="0.05" color="green" 
                hoverable pressable-button="action: color; value: green"></a-box>
      </a-entity>

      <a-entity position="0.3 0.1 0.05">
         <a-box class="button" width="0.2" height="0.2" depth="0.05" color="blue" 
                hoverable pressable-button="action: color; value: blue"></a-box>
      </a-entity>

      <a-entity position="-0.2 -0.2 0.05">
         <a-box class="button" width="0.3" height="0.15" depth="0.05" color="#777" 
                hoverable pressable-button="action: size; value: 0.1"></a-box>
         <a-text value="+SIZE" align="center" position="0 0 0.03" width="1.5"></a-text>
      </a-entity>

      <a-entity position="0.2 -0.2 0.05">
         <a-box class="button" width="0.3" height="0.15" depth="0.05" color="#777" 
                hoverable pressable-button="action: size; value: -0.1"></a-box>
         <a-text value="-SIZE" align="center" position="0 0 0.03" width="1.5"></a-text>
      </a-entity>
    </a-entity>

    <a-box physics-destruction static-body="shape: box; emitCollisionEvents: true; sensor: true" position="0.44 0.5 -5.8" width="6" height="2" depth="4" color="red" opacity="0.3"></a-box>

  </a-scene>
</body>
</html>
