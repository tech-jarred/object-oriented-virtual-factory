<!DOCTYPE html>
<html>
<head>
  <title>A-Frame Tactile Factory</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script>
    delete AFRAME.components["grabbable"];
  </script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.x/dist/aframe-extras.min.js"></script>
  <script src="https://unpkg.com/super-hands@^3.0.6/dist/super-hands.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
  <script src="https://unpkg.com/aframe-event-set-component@^4.1.1/dist/aframe-event-set-component.min.js"></script>
  <script src="https://unpkg.com/aframe-environment-component@1.5.x/dist/aframe-environment-component.min.js"></script>

  <script>
    window.factorySettings = {
      size: 0.3,
      color: "red",
      spawnRate: 2000
    };

    AFRAME.registerComponent('spawner', {
      init: function () { this.startSpawning(); },
      startSpawning: function () {
        this.spawnTimer = setInterval(() => { this.createEntity(); }, window.factorySettings.spawnRate);
      },
      createEntity: function () {
        let el = document.createElement('a-box');
        const spawnPos = this.el.object3D.position;
        const s = window.factorySettings.size;
        el.setAttribute('position', {x: spawnPos.x, y: spawnPos.y, z: spawnPos.z});
        el.setAttribute('scale', {x: s, y: s, z: s});
        el.setAttribute('color', window.factorySettings.color);
        el.setAttribute('dynamic-body', 'mass: 1; allowSleep: false');
        el.setAttribute('hoverable', '');
        el.setAttribute('grabbable', '');
        el.classList.add('spawned-item');
        this.el.sceneEl.appendChild(el);
      }
    });

    AFRAME.registerComponent('pressable-button', {
      schema: {
        action: {type: 'string'},
        value: {type: 'string'}
      },
      init: function () {
        this.isHovered = false;

        // Initialize two sound components: one for 'down', one for 'up'
        this.el.setAttribute('sound__down', {
          src: '#soundDown',
          autoplay: false,
          poolSize: 5
        });
        this.el.setAttribute('sound__up', {
          src: '#soundUp',
          autoplay: false,
          poolSize: 5
        });

        this.el.addEventListener('hover-start', (e) => {
          if (!this.isHovered) {
            this.isHovered = true;
            this.executeAction();
            // Play the "Down" sound
            this.el.components.sound__down.playSound();
          }
        });

        this.el.addEventListener('hover-end', () => {
          this.isHovered = false;
          this.el.setAttribute('position', {x: 0, y: 0, z: 0});
          // Play the "Up" sound
          this.el.components.sound__up.playSound();
        });
      },
      executeAction: function() {
        const data = this.data;
        if (data.action === 'color') {
          window.factorySettings.color = data.value;
        } else if (data.action === 'size') {
          window.factorySettings.size += parseFloat(data.value);
          window.factorySettings.size = Math.max(0.1, Math.min(2, window.factorySettings.size));
        }
        this.el.setAttribute('position', {x: 0, y: 0, z: -0.025});
      }
    });

    AFRAME.registerComponent('physics-destruction', {
      init: function () {
        this.el.addEventListener('collide', (e) => {
          const collidedEl = e.detail.body.el;
          if (collidedEl && collidedEl.classList.contains('spawned-item')) {
            setTimeout(() => { if (collidedEl.parentNode) collidedEl.parentNode.removeChild(collidedEl); }, 0);
          }
        });
      }
    });
  </script>
</head>

<body>
  <a-scene physics="debug: false">
    <a-assets>
      <audio id="soundDown" src="sources/button_down.wav" preload="auto"></audio>
      <audio id="soundUp" src="sources/button_up.wav" preload="auto"></audio>
    </a-assets>

    <a-entity environment="preset: checkerboard" position="0 -10 0"></a-entity>
    
    <a-entity id="player" movement-controls="speed: 0.15">
      <a-camera position="0 1.6 0"></a-camera>
      <a-entity sphere-collider="objects: .spawned-item, .button" super-hands static-body="shape: sphere; sphereRadius: 0.05" hand-controls="hand: left"></a-entity>
      <a-entity sphere-collider="objects: .spawned-item, .button" super-hands static-body="shape: sphere; sphereRadius: 0.05" hand-controls="hand: right"></a-entity>
    </a-entity>
    
    <a-plane static-body color="#0000FF" rotation="-90 0 0" width="20" height="20"></a-plane>
    <a-sphere id="testing" position="0.44 5 -5.8" color="white" radius="0.5" spawner></a-sphere>

    <a-entity position="-2 1 -2" rotation="0 45 0">
      <a-box width="1.5" height="1" depth="0.1" color="#444"></a-box>
      <a-text value="FACTORY CONTROLS" align="center" position="0 0.4 0.06" width="2"></a-text>

      <a-entity position="-0.4 0.1 0.05">
        <a-box class="button" width="0.3" height="0.3" depth="0.1" color="red" 
               hoverable pressable-button="action: color; value: red"></a-box>
      </a-entity>

      <a-entity position="0 0.1 0.05">
        <a-box class="button" width="0.3" height="0.3" depth="0.1" color="green" 
               hoverable pressable-button="action: color; value: green"></a-box>
      </a-entity>

      <a-entity position="0.4 0.1 0.05">
        <a-box class="button" width="0.3" height="0.3" depth="0.1" color="blue" 
               hoverable pressable-button="action: color; value: blue"></a-box>
      </a-entity>

      <a-entity position="-0.2 -0.3 0.05">
        <a-box class="button" width="0.3" height="0.2" depth="0.1" color="#999" 
               hoverable pressable-button="action: size; value: 0.1"></a-box>
        <a-text value="+ SIZE" align="center" position="0 0 0.06" width="1.5"></a-text>
      </a-entity>

      <a-entity position="0.2 -0.3 0.05">
        <a-box class="button" width="0.3" height="0.2" depth="0.1" color="#999" 
               hoverable pressable-button="action: size; value: -0.1"></a-box>
        <a-text value="- SIZE" align="center" position="0 0 0.06" width="1.5"></a-text>
      </a-entity>
    </a-entity>

    <a-box physics-destruction static-body="shape: box; emitCollisionEvents: true; sensor: true" position="0.44 0.5 -10" width="6" height="2" depth="4" color="red" opacity="0.3"></a-box>

  </a-scene>
</body>
</html>
