<!DOCTYPE html>
<html>
<head>
  <title>A-Frame Tactile Factory - Functional Conveyor</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script>
    delete AFRAME.components["grabbable"];
  </script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.x/dist/aframe-extras.min.js"></script>
  <script src="https://unpkg.com/super-hands@^3.0.6/dist/super-hands.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
  <script src="https://unpkg.com/aframe-environment-component@1.5.x/dist/aframe-environment-component.min.js"></script>

  <script>
    window.factorySettings = { size: 0.3, color: "red", spawnRate: 2000 };

    // IMPROVED CONVEYOR COMPONENT
    AFRAME.registerComponent('conveyor-belt', {
      schema: { speed: {type: 'number', default: 1.5} },
      init: function() {
        this.itemsOnBelt = new Set();
        // Listen for collision start
        this.el.addEventListener('collide', (e) => {
          const el = e.detail.body.el;
          if (el && el.classList.contains('spawned-item')) {
            this.itemsOnBelt.add(el);
          }
        });
      },
      tick: function() {
        // Every frame, push items that are currently touching the belt
        this.itemsOnBelt.forEach(el => {
          if (!el.body) {
            this.itemsOnBelt.delete(el);
            return;
          }

          // Check if still touching (simple distance/collision check)
          // For now, we apply velocity. Based on belt rotation y:
          const rotation = this.el.object3D.rotation.y;
          const vx = Math.sin(rotation) * this.data.speed * -1;
          const vz = Math.cos(rotation) * this.data.speed * -1;

          // Apply velocity while keeping the object's current downward gravity
          el.body.velocity.set(vx, el.body.velocity.y, vz);
        });
      }
    });

    AFRAME.registerComponent('spawner', {
      init: function () { this.startSpawning(); },
      startSpawning: function () {
        this.spawnTimer = setInterval(() => { this.createEntity(); }, window.factorySettings.spawnRate);
      },
      createEntity: function () {
        let el = document.createElement('a-box');
        const spawnPos = this.el.object3D.position;
        const s = window.factorySettings.size;
        el.setAttribute('position', {x: spawnPos.x, y: spawnPos.y, z: spawnPos.z});
        el.setAttribute('scale', {x: s, y: s, z: s});
        el.setAttribute('color', window.factorySettings.color);
        el.setAttribute('dynamic-body', 'mass: 1; allowSleep: false');
        el.setAttribute('hoverable', '');
        el.setAttribute('grabbable', '');
        el.classList.add('spawned-item');
        this.el.sceneEl.appendChild(el);
      }
    });

    AFRAME.registerComponent('pressable-button', {
      schema: { action: {type: 'string'}, value: {type: 'string'} },
      init: function () {
        this.isHovered = false;
        this.el.addEventListener('hover-start', () => {
          if (!this.isHovered) {
            this.isHovered = true;
            this.executeAction();
          }
        });
        this.el.addEventListener('hover-end', () => {
          this.isHovered = false;
          this.el.setAttribute('position', {x: 0, y: 0, z: 0});
        });
      },
      executeAction: function() {
        if (this.data.action === 'color') window.factorySettings.color = this.data.value;
        if (this.data.action === 'size') {
          window.factorySettings.size += parseFloat(this.data.value);
          window.factorySettings.size = Math.max(0.1, Math.min(2, window.factorySettings.size));
        }
        this.el.setAttribute('position', {x: 0, y: 0, z: -0.025});
      }
    });
  </script>
</head>

<body>
  <a-scene physics="debug: true">
    <a-assets>
      <a-asset-item id="duck-vader" src="sources/models/new_darth_vader_rubber_duck.glb"></a-asset-item>
      <a-mixin id="duck-proxy" geometry="primitive: box; width: 0.35; height: 0.35; depth: 0.35" material="opacity: 0.2" dynamic-body="mass: 1" grabbable hoverable></a-mixin>
      <a-mixin id="duck-model" scale="0.2 0.2 0.2" position="0 -0.15 0"></a-mixin>
      <a-mixin id="button-base" geometry="primitive: box; width: 0.3; height: 0.3; depth: 0.1" hoverable></a-mixin>
    </a-assets>

    <a-entity environment="preset: checkerboard" position="0 -10 0"></a-entity>
    <a-plane static-body color="#0000FF" rotation="-90 0 0" width="20" height="20"></a-plane>

    <a-sphere position="0.44 5 -5.8" radius="0.5" spawner></a-sphere>

    <a-entity position="2 0.5 -2" rotation="0 -45 0">
      <a-box 
        id="belt-surface"
        width="1.5" height="0.1" depth="0.8" 
        color="#222" 
        static-body 
        conveyor-belt="speed: 1.5">
      </a-box>
    </a-entity>

    <a-box mixin="duck-proxy" position="2 2 -1" class="spawned-item">
      <a-entity mixin="duck-model" gltf-model="#duck-vader"></a-entity>
    </a-box>

    <a-entity position="-2 1 -2" rotation="0 45 0">
      <a-box width="1.5" height="1" depth="0.1" color="#444"></a-box>
      <a-entity position="-0.4 0.1 0.05">
        <a-box mixin="button-base" material="color: red" class="button" pressable-button="action: color; value: red"></a-box>
      </a-entity>
      <a-entity position="0 -0.3 0.05">
        <a-box mixin="button-base" class="button" pressable-button="action: size; value: 0.1"></a-box>
      </a-entity>
    </a-entity>

  </a-scene>
</body>
</html>
