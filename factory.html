<!DOCTYPE html>
<html>
<head>
  <title>Rubber Duck Factory</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script>
    // Standard fix for super-hands component conflict
    delete AFRAME.components["grabbable"];
  </script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.x/dist/aframe-extras.min.js"></script>
  <script src="https://unpkg.com/super-hands@^3.0.6/dist/super-hands.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
  <script src="https://unpkg.com/aframe-event-set-component@^4.1.1/dist/aframe-event-set-component.min.js"></script>
  <script src="https://unpkg.com/aframe-environment-component@1.5.x/dist/aframe-environment-component.min.js"></script>

  <script>
    // --- GLOBAL STATE ---
    window.factorySettings = {
      size: 0.3,
      spawnRate: 5000,
      spawnActive: true,
      
      soundIndex: 0,
      sounds: [
        { name: "Squeak", file: "regular_squeak_sound.mp3" },
        { name: "Quack 1", file: "quack_1_sound.mp3" },
        { name: "Quack 2", file: "quack_2_sound.mp3" },
        { name: "Bee Buzz", file: "bee_buzz_sound.mp3" },
        { name: "Robo Beep", file: "robo_beep_sound.mp3" },
        { name: "Darth Vader", file: "darth_vader_breath_sound.mp3" },
        { name: "I'm Batman", file: "im_batman_sound.mp3" }
      ],

      modelIndex: 0,
      models: [
        { name: "Rubber Duck", id: "#duck-regular" },
        { name: "Sir Duck", id: "#duck-tophat" },
        { name: "Bee Duck", id: "#duck-bee" },
        { name: "Robo Duck", id: "#duck-robo" },
        { name: "Darth Duck", id: "#duck-vader" },
        { name: "Batman", id: "#duck-batman" }
      ],
      
      get quackSound() { 
        return "sources/sounds/" + this.sounds[this.soundIndex].file; 
      },
      get currentModel() { 
        return this.models[this.modelIndex].id; 
      }
    };

    // --- UI COMPONENTS ---

    AFRAME.registerComponent('selector-manager', {
      schema: { 
        type: { type: 'string' }, 
        screenId: { type: 'string' } 
      },
      init: function () { 
        this.updateDisplay(); 
      },
      cycle: function(direction) {
        const s = window.factorySettings;
        if (this.data.type === 'sound') {
          s.soundIndex = (s.soundIndex + direction + s.sounds.length) % s.sounds.length;
        } else {
          s.modelIndex = (s.modelIndex + direction + s.models.length) % s.models.length;
        }
        this.updateDisplay();
      },
      updateDisplay: function() {
        const s = window.factorySettings;
        const screen = document.querySelector(this.data.screenId);
        if (screen) {
          screen.setAttribute('value', this.data.type === 'sound' ? s.sounds[s.soundIndex].name : s.models[s.modelIndex].name);
        }
      }
    });

    AFRAME.registerComponent('pressable-button', {
      schema: { 
        action: {type: 'string'}, 
        value: {type: 'string'} 
      },
      init: function () {
        this.isHovered = false;
        this.el.addEventListener('hover-start', () => {
          if (!this.isHovered) {
            this.isHovered = true;
            this.executeAction();
            if(this.el.components.sound__down) this.el.components.sound__down.playSound();
          }
        });
        this.el.addEventListener('hover-end', () => {
          this.isHovered = false;
          // Return to original position
          this.el.setAttribute('position', {
            x: this.el.object3D.position.x, 
            y: this.el.object3D.position.y, 
            z: 0
          });
          if(this.el.components.sound__up) this.el.components.sound__up.playSound();
        });
      },
      executeAction: function() {
        if (this.data.action === 'size') {
          window.factorySettings.size = Math.max(0.1, Math.min(1, window.factorySettings.size + parseFloat(this.data.value)));
        } else if (this.data.action === 'cycle') {
          const manager = this.el.closest('[selector-manager]');
          if (manager) manager.components['selector-manager'].cycle(parseInt(this.data.value));
        }
        // Visual "click" depth
        this.el.setAttribute('position', {
          x: this.el.object3D.position.x, 
          y: this.el.object3D.position.y, 
          z: -0.025
        });
      }
    });

    AFRAME.registerComponent('toggle-logic', {
      init: function () {
        this.el.addEventListener('hover-start', () => {
          const settings = window.factorySettings;
          const spawnerEl = document.querySelector('[spawner]');
          
          settings.spawnActive = !settings.spawnActive;
          
          // Color logic: Red = ON, Green = OFF
          this.el.setAttribute('material', 'color', settings.spawnActive ? 'red' : 'green');
          
          if (spawnerEl) {
            if (settings.spawnActive) spawnerEl.components.spawner.startSpawning();
            else spawnerEl.components.spawner.stopSpawning();
          }
        });
      }
    });

    // --- FACTORY MECHANICS ---

    AFRAME.registerComponent('spawner', {
      init: function () { 
        this.startSpawning(); 
      },
      startSpawning: function () {
        this.stopSpawning(); // Clear existing interval
        this.spawnTimer = setInterval(() => { 
          this.createEntity(); 
        }, window.factorySettings.spawnRate);
        
        // Future Sound Hook
        if (this.el.components.sound) this.el.components.sound.playSound();
      },
      stopSpawning: function () {
        if (this.spawnTimer) clearInterval(this.spawnTimer);
        
        // Future Sound Hook
        if (this.el.components.sound) this.el.components.sound.pauseSound();
      },
      createEntity: function () {
        let el = document.createElement('a-entity');
        el.setAttribute('mixin', 'duck-proxy');
        
        const spawnPos = this.el.object3D.position;
        const s = window.factorySettings.size;
        
        el.setAttribute('position', {x: spawnPos.x, y: spawnPos.y, z: spawnPos.z});
        el.setAttribute('scale', {x: s, y: s, z: s});
        el.setAttribute('sound', `src: url(${window.factorySettings.quackSound}); autoplay: false; poolSize: 3`);
        
        let model = document.createElement('a-entity');
        model.setAttribute('mixin', 'duck-model');
        model.setAttribute('gltf-model', window.factorySettings.currentModel);
        
        el.appendChild(model);
        el.classList.add('spawned-item');
        this.el.sceneEl.appendChild(el);
      }
    });
    
    // spatial-conveyor -- Moves ducks along the belt
    AFRAME.registerComponent('spatial-conveyor', {
      schema: { 
        speed: {type: 'number', default: 1.5}, 
        width: {type: 'number', default: 2}, 
        depth: {type: 'number', default: 8}, 
        height: {type: 'number', default: 0.5} 
      },
      init: function () { 
        this.spawnedItems = []; 
        this.localPos = new THREE.Vector3(); 
      },
      tick: function () {
        this.spawnedItems = document.querySelectorAll('.spawned-item');
        const direction = new THREE.Vector3(0, 0, 1);
        this.el.object3D.getWorldDirection(direction);

        this.spawnedItems.forEach((el) => {
          if (!el.body) return;
          this.el.object3D.worldToLocal(this.localPos.copy(el.object3D.position));
          
          const isInside = Math.abs(this.localPos.x) < this.data.width / 2 && 
                           Math.abs(this.localPos.z) < this.data.depth / 2 && 
                           this.localPos.y > -0.1 && 
                           this.localPos.y < this.data.height;

          if (isInside) {
            el.body.wakeUp(); 
            el.body.fixedRotation = true; 
            el.body.updateMassProperties();
            el.body.velocity.set(direction.x * this.data.speed, el.body.velocity.y, direction.z * this.data.speed);
          } else if (el.body.fixedRotation) {
            el.body.fixedRotation = false; 
            el.body.updateMassProperties(); 
            el.body.velocity.set(0, el.body.velocity.y, 0);
          }
        });
      }
    });

    AFRAME.registerComponent('duck-logic', { 
      init: function () { 
        this.canQuack = false; 
        this.el.addEventListener('grab-start', () => { 
          this.canQuack = true; 
          this.playQuack(); 
        }); 
        this.el.addEventListener('collide', (e) => { 
          const target = e.detail.body.el; 
          if (this.canQuack && target && target.id === 'floor' && this.el.body.velocity.length() > 0.5) { 
            this.playQuack(); 
            this.canQuack = false; 
          } 
        }); 
      }, 
      playQuack: function() { 
        if (this.el.components.sound) this.el.components.sound.playSound(); 
      } 
    });

    AFRAME.registerComponent('physics-destruction', { 
      init: function () { 
        this.el.addEventListener('collide', (e) => { 
          const collidedEl = e.detail.body.el; 
          if (collidedEl && collidedEl.classList.contains('spawned-item')) { 
            
            // 1. Stop any playing audio immediately
            if (collidedEl.components.sound) {
              collidedEl.components.sound.stopSound();
              // 2. Remove the component to trigger its internal cleanup
              collidedEl.removeAttribute('sound'); 
            }

            // 3. Brief delay to let the browser breathe before deletion
            setTimeout(() => { 
              if (collidedEl.parentNode) {
                collidedEl.parentNode.removeChild(collidedEl); 
              }
            }, 10); 
          } 
        }); 
      } 
    });
  </script>
</head>

<body>
  <!-- Create scene -->
  <a-scene physics="debug: false; friction: 0.1; restitution: 0.5">
    <!-- Load in needed assets -->
    <a-assets>
      <!-- Audio files -->
      <audio id="soundDown" src="sources/sounds/button_down.wav" preload="auto"></audio>
      <audio id="soundUp" src="sources/sounds/button_up.wav" preload="auto"></audio>
      <audio id="machine" src="sources/sounds/machine.mp3" preload="auto"></audio>
      <audio id="truck" src="sources/sounds/truck_engine.mp3" preload="auto"></audio>
      
      <!-- Object models -->
      <a-asset-item id="duck-batman" src="sources/models/batman_rubber_duck.glb"></a-asset-item>
      <a-asset-item id="duck-bee" src="sources/models/bee_rubber_duck.glb"></a-asset-item>
      <a-asset-item id="duck-vader" src="sources/models/darth_vader_rubber_duck.glb"></a-asset-item>
      <a-asset-item id="duck-robo" src="sources/models/robo_rubber_duck.glb"></a-asset-item>
      <a-asset-item id="duck-regular" src="sources/models/rubber_duck.glb"></a-asset-item>
      <a-asset-item id="duck-tophat" src="sources/models/tophat_rubber_duck.glb"></a-asset-item>
      <a-asset-item id="factory-model" src="sources/models/factory.glb"></a-asset-item>

      <!-- Mixins definitions -->
      <a-mixin id="button-base" geometry="primitive: box; width: 0.2; height: 0.2; depth: 0.1" hoverable sound__down="src: #soundDown; autoplay: false; poolSize: 5" sound__up="src: #soundUp; autoplay: false; poolSize: 5"></a-mixin>
      <a-mixin id="duck-proxy" geometry="primitive: box; width: 1; height: 1; depth: 1" material="color: white; opacity: 0; transparent: true" dynamic-body="mass: 1; allowSleep: false" grabbable hoverable duck-logic></a-mixin>
      <a-mixin id="duck-model" scale="1 1 1" position="0 -0.5 0"></a-mixin>
    </a-assets>

    <!-- Create the player -->
    <a-entity id="player" movement-controls="speed: 0.15" kinematic-body>
      <a-camera position="0 1.6 0"></a-camera>
      <a-entity id="lHand" hand-controls="hand: left" sphere-collider="objects: .spawned-item, .button" super-hands="grabStartButtons: triggerdown; grabEndButtons: triggerup" static-body="shape: sphere; sphereRadius: 0.05"></a-entity>
      <a-entity id="rHand" hand-controls="hand: right" sphere-collider="objects: .spawned-item, .button" super-hands="grabStartButtons: triggerdown; grabEndButtons: triggerup" static-body="shape: sphere; sphereRadius: 0.05"></a-entity>
    </a-entity>
    
    <!-- Create background environment -->
    <a-entity id="environment" environment="preset: starry;" position="0 -0.01 0"></a-entity>

    <!-- Create a floor so objects won't fall through the environment -->
    <a-plane id="floor" static-body color="#0000FF" rotation="-90 0 0" width="50" height="50" visible="false"></a-plane>

    <!-- Factory model -->
    <a-entity id="factory" position="0 0 0" gltf-model="#factory-model">
      <!-- Add ambient noise spheres -->
      <a-sphere id="truck-engine-sound" visible="false" radius="1" position="1.84435 0.69328 4.15637" sound="src: #truck; autoplay: true; loop: true; refdistance: 1.5; rolloffFactor: 5; volume: 1"></a-sphere>

      <!-- Create the conveyor belt -->
      <a-entity id="conveyor-belt" scale="0.45831 1 0.70385" rotation="0 90 0" position="-0.80459 0.743 -3.37599">
        <a-box id="visual-belt" position="0 0.207 -0.09057" width="2" height="0.1" depth="6" color="#333" static-body="friction: 0; sphereRadius: NaN">
          <a-entity id="force-field" visible="true" position="0 0.06 0" spatial-conveyor="speed: 1.5; width: 2; depth: 6.5; height: 0.5"></a-entity>
        </a-box>
      </a-entity>

      <!-- Create duck spawning sphere -->
      <a-sphere id="duck-spawner" visible="false" position="-2.86503 1.699 -3.407" color="white" radius="0.5" spawner sound="src: #machine; autoplay: true; loop: true; refdistance: 2; rolloffFactor: 10"></a-sphere>

      <!-- Destruction zones -->
      <a-box id="destruction-zone1" scale="0.11 1 0.464" visible="false" physics-destruction static-body="shape: box; emitCollisionEvents: true; sensor: true; sphereRadius: NaN" position="1.30217 1.78 -3.412" width="1" height="2" depth="2.5" color="red" opacity="0.3"></a-box>
      <a-box id="destruction-zone2" visible="false" scale="0.58724 0.18362 0.36031" physics-destruction static-body="shape: box; emitCollisionEvents: true; sensor: true; sphereRadius: NaN" position="-1.14872 1.9248 4.10749" width="6" height="2" depth="4" color="red" opacity="0.3"></a-box>
      
      <!-- Create the button panel -->
      <a-entity id="button-panel" position="-0.71792 1.24553 3.00278" rotation="0 180 0">
        <!-- Back wall -->
        <a-box id="back-wall" width="1.5" height="1.4" depth="0.1" color="#444"></a-box>
        <a-text value="FACTORY CONTROLS" align="center" position="0 0.6 0.06" width="2"></a-text>

        <!-- Sound selection -->
        <a-entity id="sound-selector" position="0 0.3 0.05" selector-manager="type: sound; screenId: #sound-screen">
          <a-entity position="-0.5 0 0"><a-box mixin="button-base" material="color: #666" class="button" pressable-button="action: cycle; value: -1"></a-box><a-text value="<" align="center" position="0 0 0.06" width="2"></a-text></a-entity>
          <a-box position="0 0 0" geometry="width: 0.6; height: 0.2; depth: 0.02" material="color: black"></a-box>
          <a-text id="sound-screen" value="SOUND..." align="center" position="0 0 0.03" width="1.8" color="cyan"></a-text>
          <a-entity position="0.5 0 0"><a-box mixin="button-base" material="color: #666" class="button" pressable-button="action: cycle; value: 1"></a-box><a-text value=">" align="center" position="0 0 0.06" width="2"></a-text></a-entity>
        </a-entity>

        <!-- Model selection -->
        <a-entity id="model-selector" position="0 -0.1 0.05" selector-manager="type: model; screenId: #model-screen">
          <a-entity position="-0.5 0 0"><a-box mixin="button-base" material="color: #666" class="button" pressable-button="action: cycle; value: -1"></a-box><a-text value="<" align="center" position="0 0 0.06" width="2"></a-text></a-entity>
          <a-box position="0 0 0" geometry="width: 0.6; height: 0.2; depth: 0.02" material="color: black"></a-box>
          <a-text id="model-screen" value="MODEL..." align="center" position="0 0 0.03" width="1.8" color="lime"></a-text>
          <a-entity position="0.5 0 0"><a-box mixin="button-base" material="color: #666" class="button" pressable-button="action: cycle; value: 1"></a-box><a-text value=">" align="center" position="0 0 0.06" width="2"></a-text></a-entity>
        </a-entity>

        <!-- Size buttons -->
        <a-entity id="size-up" position="-0.2 -0.5 0.05"><a-box mixin="button-base" geometry="width: 0.3" class="button" pressable-button="action: size; value: 0.1"></a-box><a-text value="+ SIZE" align="center" position="0 0 0.06" width="1.5"></a-text></a-entity>
        <a-entity id="size-down" position="0.2 -0.5 0.05"><a-box mixin="button-base" geometry="width: 0.3" class="button" pressable-button="action: size; value: -0.1"></a-box><a-text value="- SIZE" align="center" position="0 0 0.06" width="1.5"></a-text></a-entity>

        <!-- On/off switch -->
        <a-entity id="on-off-switch" position="0.6 -0.5 0.05">
          <a-cylinder 
            class="button" 
            mixin="button-base" 
            geometry="primitive: cylinder; radius: 0.1; height: 0.1" 
            rotation="90 0 0" 
            material="color: red" 
            pressable-button="action: toggle" 
            toggle-logic>
          </a-cylinder>
        </a-entity>
      </a-entity>

      <!-- Create plane walls for dynamic and kinematic body collision -->
      <a-plane id="left-wall-front" static-body color="purple"></a-plane>
      <a-plane id="right-wall-front" static-body color="yellow"></a-plane>
      <a-plane id="left-wall" static-body color="green"></a-plane>
      <a-plane id="right-wall" static-body color="cyan"></a-plane>
      <a-plane id="back-wall" static-body color="black"></a-plane>
      <a-box id="truck-collision-zone" scale="5.90687 1.02732 1.55645" visible="false" position="-0.29167 0.92951 4.14927" static-body="sphereRadius: NaN" static-body color="gray" opacity="0.5"></a-box>
    </a-entity>
  </a-scene>
</body>
</html>
